<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lost the Track | 404</title>
    <style>
      :root {
        --gold: #f2c84b;
        --ink: #0a0a0a;
        --paper: #f7f7f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at 25% 25%, rgba(242, 200, 75, 0.15), transparent 35%),
          radial-gradient(circle at 80% 20%, rgba(242, 200, 75, 0.12), transparent 35%),
          linear-gradient(145deg, #111, #0b0b0b 50%, #0d0d0d);
        color: #fefefe;
        padding: 1.5rem;
      }

      .card {
        width: min(720px, 95vw);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 22px;
        padding: 2rem;
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 1.5rem;
        align-items: center;
      }

      .art {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 18px;
        background: radial-gradient(circle at 30% 30%, rgba(242, 200, 75, 0.2), rgba(242, 200, 75, 0.05)),
          linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.35));
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .art img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 12px 35px rgba(0, 0, 0, 0.35));
      }

      .content h1 {
        margin: 0 0 0.4rem;
        font-size: clamp(2.2rem, 4vw, 2.8rem);
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .content p {
        margin: 0.35rem 0;
        color: rgba(255, 255, 255, 0.75);
        line-height: 1.6;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.45rem 0.8rem;
        border-radius: 999px;
        background: rgba(242, 200, 75, 0.16);
        border: 1px solid rgba(242, 200, 75, 0.35);
        color: #f2c84b;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.8rem;
        width: fit-content;
        margin-bottom: 0.75rem;
      }

      .actions {
        margin-top: 1rem;
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .button {
        padding: 0.85rem 1.4rem;
        border-radius: 12px;
        border: 1px solid rgba(242, 200, 75, 0.5);
        background: linear-gradient(120deg, #f2c84b, #d9a900);
        color: #0a0a0a;
        font-weight: 700;
        text-decoration: none;
        box-shadow: 0 12px 30px rgba(242, 200, 75, 0.25);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .button:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 36px rgba(242, 200, 75, 0.35);
      }

      .ghost {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.25);
        color: #fefefe;
        box-shadow: none;
      }

      .timer {
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.7);
      }

      @media (max-width: 768px) {
        .card {
          grid-template-columns: 1fr;
        }

        .art {
          max-width: 360px;
          margin: 0 auto;
        }

        body {
          padding: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="art">
        <img src="/images/404-cassette.png" alt="Retro cassette being carried by two people" />
      </div>
      <div class="content">
        <div class="badge">404 · Track not found</div>
        <h1>Oops, we lost the beat</h1>
        <p>The page you’re looking for isn’t on this tape. We’ll rewind you back to home and keep the music going.</p>
        <div class="actions">
          <a class="button" href="/">Return home</a>
          <button class="button ghost" id="retry">Try again</button>
          <span class="timer" id="timer">Auto-redirecting in 1.5s…</span>
        </div>
      </div>
    </div>
    <script>
      const REDIRECT_DELAY = 3500
      const timerEl = document.getElementById('timer')
      const retryBtn = document.getElementById('retry')
      let remaining = REDIRECT_DELAY

      const updateTimer = () => {
        timerEl.textContent = `Auto-redirecting home in ${(remaining / 1000).toFixed(1)}s…`
      }

      const goHome = () => window.location.replace('/')

      const tick = () => {
        remaining -= 100
        if (remaining <= 0) {
          goHome()
        } else {
          updateTimer()
          setTimeout(tick, 100)
        }
      }

      retryBtn.addEventListener('click', goHome)
      updateTimer()
      setTimeout(tick, 100)
    </script>
  </body>
</html>
